<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>AWK Media — Panel Klienta (Demo)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #09090b; color: #e4e4e7; padding: 32px; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: #71717a; font-size: 13px; margin-bottom: 24px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat { background: #0f0f12; border: 1px solid #27272a; border-radius: 10px; padding: 16px; }
  .stat .num { font-size: 28px; font-weight: 700; color: #22c55e; }
  .stat .label { font-size: 12px; color: #a1a1aa; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; background: #0f0f12; border: 1px solid #27272a; border-radius: 10px; overflow: hidden; }
  th, td { text-align: left; padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #27272a; }
  th { color: #a1a1aa; font-weight: 600; text-transform: uppercase; font-size: 11px; }
  .status { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .status-NOWY { background: #3b82f622; color: #60a5fa; }
  .status-KONTAKT { background: #f59e0b22; color: #fbbf24; }
  .status-UMÓWIONY { background: #22c55e22; color: #4ade80; }
</style>
</head>
<body>
  <h1>Panel klienta — Leady</h1>
  <p class="sub">Dane pobrane z realnego workflow n8n (Google Sheets export)</p>
  <div class="stats" id="stats"></div>
  <table>
    <thead><tr><th>Firma</th><th>Branża</th><th>Status</th><th>Data</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    fetch('dashboard_data.json').then(r => r.json()).then(data => {
      const leady = data.leady || [];
      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="num">${leady.length}</div><div class="label">Wszystkich leadów</div></div>
        <div class="stat"><div class="num">${leady.filter(l => l.status === 'NOWY').length}</div><div class="label">Nowych</div></div>
        <div class="stat"><div class="num">${leady.filter(l => l.status === 'UMÓWIONY').length}</div><div class="label">Umówionych spotkań</div></div>
      `;
      document.getElementById('rows').innerHTML = leady.map(l => `
        <tr>
          <td>${l.nazwa_firmy}</td>
          <td>${l.branza}</td>
          <td><span class="status status-${l.status}">${l.status}</span></td>
          <td>${l.data_dodania}</td>
        </tr>
      `).join('');
    });
  </script>
</body>
</html>
